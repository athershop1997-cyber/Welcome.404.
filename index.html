<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome 404 Team</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- فيديو الخلفية متصل مباشرة ويعمل فوراً -->
<video autoplay loop muted playsinline webkit-playsinline id="bg-video">
    <source src="https://files.catbox.moe/iyzy94.mp4" type="video/mp4">
</video>

    <!-- التأثيرات الصوتية -->
    <audio id="hack-laugh" src="https://www.soundjay.com/human/sounds/laughter-comic-1.mp3" preload="auto"></audio>
    <audio id="typing-sound" src="https://www.soundjay.com/communication/sounds/typewriter-key-1.mp3" loop preload="auto"></audio>

    <!-- المحتوى الرئيسي يظهر فوراً بتنسيق احترافي -->
    <div class="container">
        
        <!-- الصورة في المنتصف تماماً بدون أي خلفية مضيئة أو إطار أخضر -->
        <div class="avatar-container">
            <img src="https://files.catbox.moe/vxugoo.gif" alt="Cyber Security" class="profile-img">
        </div>

        <!-- عنوان غليتش متطور -->
        <h1 class="glitch" data-text="SYSTEM INJECTED">Welcome 404 Team</h1>
        
        <!-- الشاشة البرمجية المحسّنة جمالياً -->
        <div class="terminal">
            <div class="terminal-header">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
                <span class="title">console@root: ~</span>
            </div>
            <div class="terminal-body">
                <p class="console-line">> Initializing cyber protocol...</p>
                <p class="console-line">> Bypassing proxy firewall... [SUCCESS]</p>
                <p class="console-line">> Extracting real-time victim data...</p>
                
                <!-- الصندوق النهائي للمعلومات الصحيحة -->
                <div class="info-box" id="info-box">
                    <div class="info-row"><span class="label">TARGET IP:</span> <span id="user-ip" class="target-data">Loading...</span></div>
                    <div class="info-row"><span class="label">OPERATING SYSTEM:</span> <span id="user-os" class="target-data">Checking...</span></div>
                    <div class="info-row"><span class="label">SECURITY STATUS:</span> <span class="danger">COMPROMISED (100%)</span></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
